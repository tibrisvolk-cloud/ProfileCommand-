name: Build Plugin
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download and install DiscordSRV locally
        run: |
          wget -q https://github.com/DiscordSRV/DiscordSRV/releases/download/v1.30.4/DiscordSRV.jar
          mvn install:install-file -Dfile=DiscordSRV.jar -DgroupId=com.discordsrv -DartifactId=discordsrv -Dversion=1.30.4 -Dpackaging=jar

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProfileCommand
          path: target/ProfileCommand.jar
