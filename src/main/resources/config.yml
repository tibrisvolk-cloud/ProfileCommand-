    placeholder: "statistic_play_one_minute"
  avg_life:
    label: "⏱️ Средняя жизнь"
    placeholder: "_average_life_"

top-page-size: 10

# ----------------------------
# 2FA
# ----------------------------
two-factor-auth:
  enabled: true
  session-duration-minutes: 1440
  verification-timeout-minutes: 5
  link-kick-message: '{"text":"Привяжите Discord!\nВаш код: {CODE}\nОтправьте боту в ЛС: !link {CODE}","color":"red"}'
  verify-kick-message: '{"text":"Подтвердите вход через Discord!\nБот отправил вам сообщение в ЛС.\nНажмите кнопку \"Подтвердить вход\".","color":"red"}'

# ----------------------------
# ДОСТИЖЕНИЯ
# ----------------------------
achievements:
  check-on-join: true
  list:
    veteran:
      label: "⏳ Старейшина"
      placeholder: "statistic_play_one_minute"
      threshold: 1800
      role-id: "123456789012345678"
    hunter:
      label: "⚔️ Охотник"
      placeholder: "statistic_mob_kills"
      threshold: 1000
      role-id: "123456789012345679"
    miner:
      label: "⛏️ Шахтёр"
      placeholder: "statistic_mine_block"
      threshold: 10000
      role-id: "123456789012345680"

# ----------------------------
# РЕКОРДЫ
# ----------------------------
records:
  channel-id: "123456789012345678"
  image-url: "https://example.com/landscape.png"
