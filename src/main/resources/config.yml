bot-token: "ВСТАВЬТЕ_ВАШ_ТОКЕН_БОТА"

guild-id: "123456789012345678"
player-role-id: "123456789012345678"

excluded-roles:
  - "123456789012345678"   # ID роли администратора
  - "123456789012345679"   # ID роли модератора

sync-on-join:
  nick: true
  role: true

# ----------------------------
# ПРОФИЛЬ
# ----------------------------
profile-fields:
  - emoji: "⏳"
    label: "Наиграно"
    placeholder: "statistic_time_played"
    inline: true
  - emoji: "⚔️"
    label: "Убито мобов"
    placeholder: "statistic_mob_kills"
    inline: true
  - emoji: "💀"
    label: "Смертей"
    placeholder: "statistic_deaths"
    inline: true
  - emoji: "⚔️"
    label: "Нанесено урона"
    placeholder: "_damage_dealt_hearts_"
    inline: true
  - emoji: "🛡️"
    label: "Получено урона"
    placeholder: "_damage_taken_hearts_"
    inline: true
  - emoji: "👣"
    label: "Пройдено"
    placeholder: "_distance_m_"
    inline: true
  - emoji: "⛏️"
    label: "Добыто блоков"
    placeholder: "statistic_mine_block"
    inline: true
  - emoji: "💎"
    label: "Сделок с жителями"
    placeholder: "statistic_traded_with_villager"
    inline: true
  - emoji: "👍"
    label: "Репутация"
    placeholder: "_reputation_"
    inline: true
  - emoji: "🔗"
    label: "Discord"
    placeholder: "_discord_"
    inline: true

# ----------------------------
# ТОП-ЛИСТЫ
# ----------------------------
top-categories:
  mobs:
    label: "⚔️ Убито мобов"
    placeholder: "statistic_mob_kills"
  blocks:
    label: "⛏️ Добыто блоков"
    placeholder: "statistic_mine_block"
  damage_dealt:
    label: "⚔️ Нанесено урона"
    placeholder: "_damage_dealt_hearts_"
  damage_taken:
    label: "🛡️ Получено урона"
    placeholder: "_damage_taken_hearts_"
  deaths:
    label: "💀 Смертей"
    placeholder: "statistic_deaths"
  trades:
    label: "💎 Сделок с жителями"
    placeholder: "statistic_traded_with_villager"
  distance:
    label: "👣 Пройдено"
    placeholder: "statistic_walk_one_cm"       # сырые сантиметры
  playtime:
    label: "⏳ Время игры"
    placeholder: "statistic_time_played"       # парсим в минуты
  reputation:
    label: "👍 Репутация"
    placeholder: "_reputation_"

top-page-size: 10

# ----------------------------
# КАРТОЧКИ ТОПА
# ----------------------------
top-cards:
  enabled: true
  default-view: "list"         # "list" или "cards"
  gold-color: "#FFD700"
  silver-color: "#C0C0C0"
  bronze-color: "#CD7F32"
  default-color: "#5865F2"
  background-url: ""

# ----------------------------
# 2FA
# ----------------------------
two-factor-auth:
  enabled: true
  session-duration-minutes: 1440
  verification-timeout-minutes: 5
  link-kick-message: "&cПривяжите Discord!\n&fВаш код: &e{CODE}\n&fОтправьте боту в ЛС: &a!link {CODE}"
  verify-kick-message: "&cПодтвердите вход через Discord!\n&fБот отправил вам сообщение в ЛС.\n&fНажмите кнопку \"Подтвердить вход\"."

# ----------------------------
# ДОСТИЖЕНИЯ
# ----------------------------
achievements:
  check-on-join: true
  list:
    veteran:
      label: "⏳ Старейшина"
      placeholder: "statistic_play_one_minute"
      threshold: 1800
      role-id: "123456789012345678"
    hunter:
      label: "⚔️ Охотник"
      placeholder: "statistic_mob_kills"
      threshold: 1000
      role-id: "123456789012345679"
    miner:
      label: "⛏️ Шахтёр"
      placeholder: "statistic_mine_block"
      threshold: 10000
      role-id: "123456789012345680"

# ----------------------------
# РЕКОРДЫ
# ----------------------------
records:
  channel-id: "123456789012345678"
  image-url: "https://example.com/landscape.png"
  update-interval-minutes: 10

# ----------------------------
# РЕПУТАЦИЯ
# ----------------------------
reputation:
  enabled: true
  daily-limit: 5
  cooldown-minutes: 1
  require-linked-to-vote: true
  vote-bypass-roles:
    - "123456789012345678"   # ID роли администратора
  reputation-roles:
    50:
      label: "Уважаемый"
      role-id: "123456789012345679"
    100:
      label: "Легенда"
      role-id: "123456789012345680"
    200:
      label: "Душа компании"
      role-id: "123456789012345681"
