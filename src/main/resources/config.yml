# ----------------------------
# ТОП-ЛИСТЫ
# ----------------------------
top-categories:
  mobs:
    label: "⚔️ Убито мобов"
    placeholder: "statistic_mob_kills"
  blocks:
    label: "⛏️ Добыто блоков"
    placeholder: "statistic_mine_block"
  damage_dealt:
    label: "⚔️ Нанесено урона"
    placeholder: "statistic_damage_dealt"
  damage_taken:
