# ----------------------------
# ТОП-ЛИСТЫ
# ----------------------------
top-categories:
  mobs:
    label: "⚔️ Убито мобов"
    placeholder: "statistic_mob_kills"
  blocks:
    label: "⛏️ Добыто блоков"
    placeholder: "statistic_mine_block"
  damage_dealt:
    label: "⚔️ Нанесено урона"
    placeholder: "_damage_dealt_hearts_"
  damage_taken:
    label: "🛡️ Получено урона"
    placeholder: "_damage_taken_hearts_"
  deaths:
    label: "💀 Смертей"
    placeholder: "statistic_deaths"
  trades:
    label: "💎 Сделок с жителями"
    placeholder: "statistic_traded_with_villager"
  distance:
    label: "👣 Пройдено"
    placeholder: "statistic_walk_one_cm"
  playtime:
    label: "⏳ Время игры"
    placeholder: "statistic_time_played"
  level:
    label: "⭐ Уровень"
    placeholder: "_level_"

top-page-size: 10

# ----------------------------
# 2FA
# ----------------------------
two-factor-auth:
  enabled: true
  session-duration-minutes: 1440
  verification-timeout-minutes: 5
  link-kick-message: "&cПривяжите Discord!\n&fВаш код: &e{CODE}\n&fОтправьте боту в ЛС: &a!link {CODE}"
  verify-kick-message: "&cПодтвердите вход через Discord!\n&fБот отправил вам сообщение в ЛС.\n&fНажмите кнопку \"Подтвердить вход\"."

# ----------------------------
# ДОСТИЖЕНИЯ
# ----------------------------
achievements:
  check-on-join: true
  list:
    veteran:
      label: "⏳ Старейшина"
      placeholder: "statistic_play_one_minute"
      threshold: 1800
      role-id: "123456789012345678"
    hunter:
      label: "⚔️ Охотник"
      placeholder: "statistic_mob_kills"
      threshold: 1000
      role-id: "123456789012345679"
    miner:
      label: "⛏️ Шахтёр"
      placeholder: "statistic_mine_block"
      threshold: 10000
      role-id: "123456789012345680"

# ----------------------------
# РЕКОРДЫ
# ----------------------------
records:
  channel-id: "123456789012345678"
  image-url: "https://example.com/landscape.png"
  update-interval-minutes: 10

# ----------------------------
# СИСТЕМА УРОВНЕЙ
# ----------------------------
levels:
  enabled: true
  text-xp:
    enabled: true
    channels: ["1234567890", "1234567891"]  # ID текстовых каналов
    xp-per-message: 10
    cooldown-seconds: 60
    min-length: 8
  voice-xp:
    enabled: true
    xp-per-minute: 5
    check-interval-minutes: 5
    exclude-afk: true
    min-members: 2
    multiplier-for-streaming: 1.5
  level-formula:
    base: 100
    exponent: 2.0
  level-roles:
    5: "123456789012345678"   # Роль "Новичок"
    10: "123456789012345679"  # Роль "Активист"
    20: "123456789012345680"  # Роль "Легенда"
