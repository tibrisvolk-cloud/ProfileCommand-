bot-token: "ВСТАВЬТЕ_ВАШ_ТОКЕН_БОТА"

two-factor-auth:
  enabled: true
  # Время жизни сессии (минут), если IP не менялся
  session-duration-minutes: 1440  # сутки
  # Сообщение при кике на привязку
  link-kick-message: |
    &cПривяжите Discord!
    &fВаш код: &e{CODE}
    &fОтправьте боту в ЛС: &a!link {CODE}
  # Сообщение при кике на подтверждение входа
  verify-kick-message: |
    &cПодтвердите вход через Discord!
    &fБот отправил вам сообщение в ЛС.
    &fНажмите кнопку "Подтвердить вход".

# Профиль
